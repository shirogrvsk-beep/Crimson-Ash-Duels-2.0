name: CrimsonAshDuels
version: 1.0.0
main: com.crimsonashduels.CrimsonAshDuels
api-version: 1.21
author: Shiro
description: A dueling plugin inspired by DonutDuels
commands:
  duel:
    description: Challenge another player
    usage: /duel <player>
  duelaccept:
    description: Accept a duel
    usage: /duelaccept
  savearena:
    description: Save an arena schematic
    usage: /savearena <name>
  restorearena:
    description: Restore an arena schematic
    usage: /restorearena <name>
